name: Validate generated agent/plugin artifacts

on:
  pull_request:
    paths:
      - "scripts/**"
      - "**/SKILL.md"
      - "agents/AGENTS.md"
      - "README.md"
      - "package.json"
      - ".claude-plugin/**"
      - "gemini-extension.json"
      - ".cursor-plugin/**"
      - ".mcp.json"
      - "tests/**"
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "**/SKILL.md"
      - "package.json"
      - ".claude-plugin/marketplace.json"
      - "tests/**"
  workflow_dispatch:
    inputs:
      run_e2e:
        description: "Run E2E tests (Tier 3)"
        type: boolean
        default: false
      test_agent:
        description: "Agent to use for E2E tests"
        type: choice
        options:
          - claude-code
          - codex
          - gemini
          - all
        default: claude-code

jobs:
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci || npm install

      - name: Ensure generated files are up to date
        run: ./scripts/publish.sh --check

      - name: Run structural tests (Tier 1)
        run: npm run test:structural

  test-e2e:
    if: >
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.run_e2e == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        agent: ${{ fromJson(
          github.event.inputs.test_agent == 'all'
            && '["claude-code","codex","gemini"]'
            || format('["{0}"]', github.event.inputs.test_agent || 'claude-code')
          ) }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run E2E tests (Tier 3)
        env:
          RUN_E2E: "1"
          TEST_AGENT: ${{ matrix.agent }}
          SOCKET_SECURITY_API_KEY: ${{ secrets.SOCKET_SECURITY_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: npm run test:e2e

  update:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci || npm install

      - name: Regenerate artifacts
        run: ./scripts/publish.sh

      - name: Commit changes if any
        run: |
          git diff --quiet && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add agents/AGENTS.md README.md .cursor-plugin/plugin.json .mcp.json \
                 .claude-plugin/plugin.json .claude-plugin/marketplace.json \
                 gemini-extension.json
          git diff --cached --quiet && exit 0
          git commit -m "chore: regenerate artifacts [skip ci]"
          git push
